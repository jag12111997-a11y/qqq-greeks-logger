# ============================================================
# QQQ Greeks Logger — MIDDAY burst
# ============================================================
# 12:15-1:30 PM Pacific: one snapshot every 1 minute, window +/-$7.
#
# GitHub cron can't fire every minute, so this ONE job starts at
# 12:15 and loops internally every 60 seconds for 75 minutes.
#   19:15 UTC = 12:15 PM PDT (summer). In winter it shifts to
#   11:15 AM PST until the cron is bumped.
# Runs to 1:30 on purpose: the free feed is ~15 min delayed, so the
# ~1:15 snapshot is what actually shows the 1:00 PM close.
# ============================================================

name: QQQ Greeks Logger - Midday

# Started by cron-job.org at 12:15 PM Pacific (weekdays), which fires on time
# via workflow_dispatch. GitHub's own cron is intentionally NOT used here
# (it runs late/unreliably and would cause duplicate sessions).
on:
  workflow_dispatch: {}

concurrency:
  group: qqq-midday
  cancel-in-progress: false

jobs:
  log-greeks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run logger (12:15-1:30 PT, every 1 min, +/-$7)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          SESSION: 'pm'
          WINDOW: '7'
          INTERVAL_SECONDS: '60'
          DURATION_SECONDS: '4500'
        run: python qqq_greeks_logger_alpaca.py

      - name: Commit updated data back to repo
        if: always()
        run: |
          git config user.name "qqq-logger-bot"
          git config user.email "actions@github.com"
          git add data
          git commit -m "Midday session $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git pull --rebase --autostash origin main || true
          git push || (git pull --rebase --autostash origin main && git push)
