# ============================================================
# QQQ Greeks Logger — MORNING burst
# ============================================================
# 6:45-8:45 AM Pacific: one snapshot every 5 minutes, window +/-$15.
#
# GitHub cron runs on UTC and can't schedule faster than every 5 min,
# so this ONE job starts at 6:45 and loops internally for 2 hours.
#   13:45 UTC = 6:45 AM PDT (summer). In winter it shifts to 5:45 AM
#   PST until the cron is bumped. GitHub may start the job a few
#   minutes late; once started, the 5-minute cadence is exact.
# ============================================================

name: QQQ Greeks Logger - Morning

# Started by cron-job.org at 6:45 AM Pacific (weekdays), which fires on time
# via workflow_dispatch. GitHub's own cron is intentionally NOT used here
# (it runs late/unreliably and would cause duplicate sessions).
on:
  workflow_dispatch: {}

concurrency:
  group: qqq-morning
  cancel-in-progress: false

jobs:
  log-greeks:
    runs-on: ubuntu-latest
    timeout-minutes: 135
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run logger (6:45-8:45 PT, every 5 min, +/-$15)
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          SESSION: 'am'
          WINDOW: '15'
          INTERVAL_SECONDS: '300'
          DURATION_SECONDS: '7200'
        run: python qqq_greeks_logger_alpaca.py

      - name: Commit updated data back to repo
        if: always()
        run: |
          git config user.name "qqq-logger-bot"
          git config user.email "actions@github.com"
          git add data
          git commit -m "Morning session $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git pull --rebase --autostash origin main || true
          git push || (git pull --rebase --autostash origin main && git push)
