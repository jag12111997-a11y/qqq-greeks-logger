# ============================================================
# GITHUB ACTIONS SCHEDULE FILE — Alpaca version
# ============================================================
# Save as: .github/workflows/qqq_logger.yml
#
# RUN TIMES — chosen to stay INSIDE U.S. market hours in BOTH
# daylight saving (summer) and standard time (winter). GitHub's
# scheduler always runs on UTC and ignores daylight saving, so
# these fixed UTC times are picked to be safe in either season.
#
#   UTC time      Summer (PDT)     Winter (PST)
#   15:00 UTC  ->   8:00 AM          7:00 AM
#   17:15 UTC  ->  10:15 AM          9:15 AM
#   19:30 UTC  ->  12:30 PM         11:30 AM
#
#   The market is open 6:30 AM - 1:00 PM Pacific year-round, so
#   all three runs land safely inside the session either season.
#
# TWO SECRETS NEEDED (Alpaca uses a Key + Secret pair):
#     ALPACA_API_KEY     -> your Key ID
#     ALPACA_API_SECRET  -> your Secret Key
# ============================================================

name: QQQ Greeks Logger

on:
  schedule:
    - cron: '0 15 * * 1-5'
    - cron: '15 17 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch: {}

jobs:
  log-greeks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run logger
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python qqq_greeks_logger_alpaca.py

      - name: Commit updated CSV back to repo
        run: |
          git config user.name "qqq-logger-bot"
          git config user.email "actions@github.com"
          git add qqq_greeks_log.csv
          git commit -m "Log run $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes to commit"
          git push
